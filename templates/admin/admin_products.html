{% extends 'base.html' %}

{% block title %}Admin Products{% endblock %}

{% block content %}

<div class="container py-4 py-md-5">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
        <h3 class="mb-2 mb-md-0">📦 Admin Products</h3>
    </div>

    <div class="row g-4">

        {% if products %}

            {% for product in products %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">

                <div class="card h-100 shadow-sm border-0 rounded-4 product-card">

                    <div class="p-3">
                        <img src="/static/uploads/product_images/{{ product.image }}" 
                             class="img-fluid w-100"
                             style="height:160px; object-fit:contain;">
                    </div>

                    <div class="card-body text-center">

                        <h6 class="fw-semibold mb-1">{{ product.name }}</h6>
                        <p class="text-muted small mb-2">{{ product.category }}</p>

                        <h5 class="text-success fw-bold">₹{{ product.price }}</h5>

                    </div>

                </div>

            </div>
            {% endfor %}

        {% else %}

            <div class="col-12 text-center py-5">
                <h5 class="text-muted">No Products Found</h5>
            </div>

        {% endif %}

    </div>

</div>

<style>
.product-card {
    transition: all 0.3s ease;
}
.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
</style>

{% endblock %}
