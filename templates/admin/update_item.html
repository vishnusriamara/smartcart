{% extends 'base.html' %}
{% block title %}Update Product{% endblock %}

{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6">

      <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-warning text-dark py-3">
          <h4 class="mb-0">✏️ Update Product</h4>
        </div>

        <div class="card-body p-4 p-md-5">

          <form method="POST"
                action="/admin/update-item/{{ product.product_id }}"
                enctype="multipart/form-data">

            <div class="mb-3">
              <label class="form-label fw-semibold">Product Name</label>
              <input type="text" name="name" value="{{ product.name }}" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea name="description" rows="3" class="form-control form-control-lg" required>{{ product.description }}</textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Category</label>
              <input type="text" name="category" value="{{ product.category }}" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Price</label>
              <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3 text-center">
              <label class="form-label fw-semibold">Current Image</label><br>
              <img src="/static/uploads/product_images/{{ product.image }}"
                   class="rounded shadow mt-2"
                   style="width:120px; object-fit:cover;">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">New Image (Optional)</label>
              <input type="file" name="image" class="form-control form-control-lg">
            </div>

            <button class="btn btn-warning w-100 py-2 fw-semibold">Update Product</button>

          </form>

          <a href="/admin/item-list" class="btn btn-secondary w-100 mt-3">Back</a>

        </div>

      </div>

    </div>
  </div>
</div>

{% endblock %}
