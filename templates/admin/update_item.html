{% extends 'base.html' %}
{% block title %}Update Product{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-lg border-0">
      <div class="card-header bg-warning text-dark">
        <h4>✏️ Update Product</h4>
      </div>

      <div class="card-body p-4">

        <form method="POST"
              action="/admin/update-item/{{ product.product_id }}"
              enctype="multipart/form-data">

          <div class="mb-3">
            <label>Product Name</label>
            <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" required>{{ product.description }}</textarea>
          </div>

          <div class="mb-3">
            <label>Category</label>
            <input type="text" name="category" value="{{ product.category }}" class="form-control" required>
          </div>

          <div class="mb-3">
            <label>Price</label>
            <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control" required>
          </div>

          <div class="mb-3 text-center">
            <label>Current Image</label><br>
            <img src="/static/uploads/product_images/{{ product.image }}"
                 class="rounded shadow"
                 style="width:120px;">
          </div>

          <div class="mb-3">
            <label>New Image (Optional)</label>
            <input type="file" name="image" class="form-control">
          </div>

          <button class="btn btn-warning w-100">Update Product</button>

        </form>

        <a href="/admin/item-list" class="btn btn-secondary w-100 mt-2">Back</a>

      </div>
    </div>

  </div>
</div>

{% endblock %}
