{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <div class="card shadow-lg border-0 rounded-4">
        
        <div class="card-header bg-warning text-dark text-center py-3">
          <h5 class="mb-0">Forgot Password</h5>
        </div>

        <div class="card-body p-4">

          <form action="/send-reset-link-admin" method="post">

            <div class="mb-3">
              <label class="form-label fw-semibold">Registered Email</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter your email" required>
            </div>

            <button class="btn btn-warning w-100 py-2 fw-semibold">
              Send Reset Link
            </button>

          </form>

          <p class="mt-3 text-center">
            <a href="/admin-login" class="text-decoration-none">← Back to Login</a>
          </p>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
