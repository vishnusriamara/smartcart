{% extends 'base.html' %}
{% block title %}Add Product{% endblock %}

{% block content %}

<div class="container py-4 py-md-5">

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">

      <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-dark text-white py-3">
          <h4 class="mb-0">➕ Add New Product</h4>
        </div>

        <div class="card-body p-4 p-md-5">

          <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
              <label class="form-label fw-semibold">Product Name</label>
              <input type="text" name="name" class="form-control form-control-lg" placeholder="Enter product name" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea name="description" rows="3" class="form-control form-control-lg" placeholder="Enter product description" required></textarea>
            </div>

            <div class="row">
              <div class="col-12 col-md-6 mb-3">
                <label class="form-label fw-semibold">Category</label>
                <input type="text" name="category" class="form-control form-control-lg" placeholder="Eg: Electronics" required>
              </div>

              <div class="col-12 col-md-6 mb-3">
                <label class="form-label fw-semibold">Price (₹)</label>
                <input type="number" name="price" class="form-control form-control-lg" placeholder="Enter price" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Product Image</label>
              <input type="file" name="images" class="form-control form-control-lg" multiple required>
            </div>

            <!-- Image Preview -->
            <div class="mb-3 text-center">
              <img id="preview" src="" class="img-fluid rounded shadow d-none" style="max-height:200px;">
            </div>

            <button class="btn btn-success w-100 py-2 fw-semibold">
              ➕ Add Product
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>

<script>
document.querySelector('input[name="images"]').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(file){
        const preview = document.getElementById('preview');
        preview.src = URL.createObjectURL(file);
        preview.classList.remove('d-none');
    }
});
</script>

{% endblock %}
