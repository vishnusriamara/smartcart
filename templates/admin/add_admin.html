{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-5">

            <div class="card shadow-lg border-0 rounded-4">

                <!-- Header -->
                <div class="card-header bg-dark text-white text-center rounded-top-4 py-3">
                    <h4 class="mb-0">➕ Add New Admin</h4>
                </div>

                <!-- Body -->
                <div class="card-body p-4 p-md-5">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Name</label>
                            <input type="text" name="name" class="form-control form-control-lg" placeholder="Enter admin name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter email address" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                        </div>

                        <button class="btn btn-primary w-100 py-2 fw-semibold">
                            🚀 Create Admin
                        </button>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
