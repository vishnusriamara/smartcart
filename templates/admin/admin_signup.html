{% extends 'base.html' %}
{% block title %}Admin Signup{% endblock %}

{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

      <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-dark text-white text-center py-3">
          <h4 class="mb-0">Admin Registration</h4>
        </div>

        <div class="card-body p-4 p-md-5">

          <form method="post" action="/admin-signup">

            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="name" class="form-control form-control-lg" placeholder="Enter name" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Email Address</label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter email" required>
            </div>

            <button class="btn btn-success w-100 py-2 fw-semibold">
              Send OTP
            </button>

          </form>

          <p class="mt-3 text-center">
            Already have an account?
            <a href="/admin-login" class="text-decoration-none">Login</a>
          </p>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
