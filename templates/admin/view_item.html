{% extends 'base.html' %}
{% block title %}Product Details{% endblock %}

{% block content %}

<div class="container py-5">
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <div class="card shadow-lg border-0 rounded-4 text-center p-4 p-md-5">

      <img src="/static/uploads/product_images/{{product.image}}"
           class="img-fluid rounded mb-4"
           style="max-height:250px; object-fit:cover;">

      <h4 class="fw-semibold">{{ product.name }}</h4>

      <p class="text-muted">{{ product.description }}</p>

      <div class="mb-3">
        <span class="badge bg-secondary">{{ product.category }}</span>
      </div>

      <h5 class="text-success fw-bold mb-3">₹{{ product.price }}</h5>

      <a href="/admin/item-list" class="btn btn-secondary px-4">Back</a>

    </div>

  </div>
</div>
</div>

{% endblock %}
