{% extends 'base.html' %}
{% block title %}Payment Success{% endblock %}

{% block content %}

<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow-lg border-0 rounded-4 text-center p-5">

    <h2 class="text-success">✅ Payment Successful</h2>
    <p class="mt-3 text-muted">Your order has been placed successfully</p>

    <hr>

    <div class="text-start mt-4">
        <p><strong>Payment ID:</strong> {{ payment_id }}</p>
        <p><strong>Order ID:</strong> {{ order_id }}</p>
        <p><strong>Delivery Address:</strong> {{ order.address }}</p>
    </div>

    <div class="mt-4 d-grid gap-2">
        <a href="/user/products" class="btn btn-primary">Continue Shopping</a>
        <a href="/user/my-orders" class="btn btn-outline-dark">View Orders</a>
    </div>

</div>

</div>
</div>
</div>

{% endblock %}
